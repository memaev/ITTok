name: tiktok_for_it
description: "ITiktok — TikTok for IT. Micro-learning for developers."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.7

  # Immutable models
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Syntax highlighting
  flutter_highlight: ^0.7.0

  # Fonts
  google_fonts: ^6.2.1

  # Animations
  flutter_animate: ^4.5.0

  # Sharing
  share_plus: ^10.0.3

  # Local storage
  shared_preferences: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^4.0.0

  # Code generation
  riverpod_generator: ^2.4.3
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  build_runner: ^2.4.13

flutter:
  uses-material-design: true

  fonts:
    - family: JetBrainsMono
      fonts:
        - asset: assets/fonts/JetBrainsMono-Regular.ttf
        - asset: assets/fonts/JetBrainsMono-Bold.ttf
          weight: 700
